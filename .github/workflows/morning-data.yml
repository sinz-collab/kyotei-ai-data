name: Morning race data

on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date in YYYY-MM-DD. Empty uses JST today."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: morning-race-data
  cancel-in-progress: false

jobs:
  fetch:
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        venue:
          - ashiya
          - shimonoseki
          - toda
          - edogawa
          - wakamatsu
          - tokoname
          - omura
          - karatsu
          - fukuoka
          - heiwajima
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automation/requirements.txt
      - name: Install runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r automation/requirements.txt
          python -m playwright install --with-deps chromium
      - name: Set target date
        shell: bash
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            echo "TARGET_DATE=$INPUT_DATE" >> "$GITHUB_ENV"
          else
            echo "TARGET_DATE=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_ENV"
          fi
      - name: Fetch venue
        run: python automation/fetch_one.py --venue "${{ matrix.venue }}" --date "$TARGET_DATE"
      - uses: actions/upload-artifact@v4
        with:
          name: morning-${{ matrix.venue }}
          path: |
            work/races/**/fetch_status.json
            work/races/**/tide_today.json
            work/races/**/races/*_entry.txt
            work/races/**/races/*_data.txt
            work/races/**/races/*_motor.txt
          if-no-files-found: error
          retention-days: 2

  publish:
    needs: fetch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: morning-*
          path: work/races
          merge-multiple: true
      - name: Set target date
        shell: bash
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            echo "TARGET_DATE=$INPUT_DATE" >> "$GITHUB_ENV"
          else
            echo "TARGET_DATE=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_ENV"
          fi
      - name: Build and validate public data
        run: python automation/build_site_data.py --date "$TARGET_DATE"
      - name: Commit public data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "Update morning race data ${TARGET_DATE}"
          git push
